  <!-- Notification Box -->
  <div id="notifBox" class="notif-box" style="display:none;"></div>

  <!-- Feed -->
  <div class="feed-container">
    <h2>Welcome to the Feed</h2>

    <!-- Create Post Form -->
    <div class="create-post">
      <textarea id="post-content" placeholder="What's on your mind?"></textarea><br>
      <input type="file" id="postImage" accept="image/*" onchange="previewImage()"><br>
      <img id="imagePreview" style="display:none; max-width: 300px; margin-top: 10px; border-radius: 10px;" alt="Image Preview"><br>
      <button onclick="createPost()">Post</button>
    </div>

    <h3>All Posts</h3>
    <div id="post-list"></div>
  </div>

  <script>
    // Logout function
    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    // Get logged in user
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) window.location.href = 'login.html';

    // Preview selected image
    function previewImage() {
      const file = document.getElementById('postImage').files[0];
      const preview = document.getElementById('imagePreview');
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          preview.src = e.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      } else {
        preview.src = '';
        preview.style.display = 'none';
      }
    }

    // Create a new post
    async function createPost() {
      const content = document.getElementById('post-content').value;
      const image = document.getElementById('postImage').files[0];

      if (!content && !image) {
        alert('Please add some content or an image.');
        return;
      }

      const formData = new FormData();
      formData.append('user_id', user.id);
      formData.append('content', content);
      if (image) formData.append('image', image);

      try {
        const res = await fetch('http://localhost:3000/api/posts', {
          method: 'POST',
          body: formData
        });

        const data = await res.json();
        alert(data.message);
        document.getElementById('post-content').value = '';
        document.getElementById('postImage').value = '';
        document.getElementById('imagePreview').style.display = 'none';
        loadPosts();
      } catch (err) {
        console.error('Error creating post:', err);
        alert('Failed to create post.');
      }
    }

    // Load all posts
    async function loadPosts() {
      const res = await fetch('http://localhost:3000/api/posts');
      const posts = await res.json();

      const postList = document.getElementById('post-list');
      postList.innerHTML = '';

      for (let post of posts) {
        const likeRes = await fetch(`http://localhost:3000/api/interactions/likes/${post.id}`);
        const likeData = await likeRes.json();

        const commentRes = await fetch(`http://localhost:3000/api/interactions/comments/${post.id}`);
        const comments = await commentRes.json();

        const div = document.createElement('div');
        div.className = 'post';

        div.innerHTML = `
          <p><strong>${post.username}</strong></p>
          <p>${post.content || ''}</p>
          ${post.image ? `<img src="http://localhost:3000/uploads/${post.image}" width="200">` : ''}
          <p>❤️ ${likeData.likes} Likes</p>
          <button onclick="toggleLike(${post.id})">Like/Unlike</button>
          <button class="bookmark-btn" data-id="${post.id}">🔖 Save</button>

          <div class="comments">
            <h4>Comments:</h4>
            ${comments.map(c => `<p><strong>${c.username}</strong>: ${c.text}</p>`).join('')}
            <input type="text" id="comment-${post.id}" placeholder="Add a comment...">
            <button onclick="addComment(${post.id})">Comment</button>
          </div>
          <hr>
        `;

        if (post.user_id === user.id) {
          div.innerHTML += `
            <button onclick="deletePost(${post.id})">Delete</button>
            <button onclick="showEditBox(${post.id}, '${post.content.replace(/'/g, "\\'")}')">Edit</button>
          `;
        }

        postList.appendChild(div);
      }

      // Add bookmark functionality
      document.querySelectorAll('.bookmark-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const postId = btn.getAttribute('data-id');
          const saved = btn.classList.contains('saved');
          const method = saved ? 'DELETE' : 'POST';
          const endpoint = saved ? 'unsave' : 'save';

          const res = await fetch(`/api/posts/${endpoint}/${postId}`, {
            method,
            headers: {
              'Authorization': 'Bearer ' + localStorage.getItem('token'),
              'Content-Type': 'application/json'
            }
          });

          if (res.ok) {
            btn.classList.toggle('saved');
            btn.textContent = saved ? '🔖 Save' : '✅ Saved';
          }
        });
      });
    }

    async function toggleLike(post_id) {
      await fetch('http://localhost:3000/api/interactions/like', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: user.id, post_id })
      });
      loadPosts();
    }

    async function addComment(post_id) {
      const input = document.getElementById(`comment-${post_id}`);
      const text = input.value.trim();
      if (!text) return;

      await fetch('http://localhost:3000/api/interactions/comment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: user.id, post_id, text })
      });
      input.value = '';
      loadPosts();
    }

    async function deletePost(postId) {
      if (confirm('Are you sure you want to delete this post?')) {
        await fetch(`http://localhost:3000/api/posts/${postId}`, {
          method: 'DELETE'
        });
        loadPosts();
      }
    }

    function showEditBox(postId, oldContent) {
      const newContent = prompt("Edit your post:", oldContent);
      if (newContent !== null && newContent !== oldContent) {
        updatePost(postId, newContent);
      }
    }

    async function updatePost(postId, content) {
      await fetch(`http://localhost:3000/api/posts/${postId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content })
      });
      loadPosts();
    }

    async function toggleNotifications() {
      const box = document.getElementById('notifBox');
      box.style.display = box.style.display === 'none' ? 'block' : 'none';

      if (box.style.display === 'block') {
        const res = await fetch(`http://localhost:3000/api/notifications/${user.id}`);
        const data = await res.json();
        box.innerHTML = data.map(n => {
          let text = '';
          if (n.type === 'like') text = `❤️ ${n.from_username} liked your post`;
          else if (n.type === 'comment') text = `💬 ${n.from_username} commented`;
          else if (n.type === 'follow') text = `➕ ${n.from_username} followed you`;
          return `<p>${text}</p>`;
        }).join('') || '<p>No notifications</p>';
      }
    }

    async function updateNotifCount() {
      const res = await fetch(`http://localhost:3000/api/notifications/${user.id}`);
      const data = await res.json();
      document.getElementById('notifCount').textContent = data.length > 0 ? `(${data.length})` : '';
    }

    // Initialize
    loadPosts();
    updateNotifCount();
    setInterval(updateNotifCount, 60000);
  </script>
