<!DOCTYPE html>
<html>
<head>
  <title>User Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="profile-container">
    <img id="profile-pic" src="" width="100" height="100" style="border-radius: 50%;" />
    <h2 id="username">User</h2>
    <div id="posts-container"></div>
  </div>

  <script>
    const userId = new URLSearchParams(window.location.search).get('id');

    fetch(`/api/user/${userId}`)
      .then(res => res.json())
      .then(user => {
        document.getElementById('username').innerText = user.username;
        document.getElementById('profile-pic').src = user.profile_image 
          ? `/uploads/profile_images/${user.profile_image}` 
          : 'default-user.png';
      });

    fetch(`/api/posts/user/${userId}`)
      .then(res => res.json())
      .then(posts => {
        const container = document.getElementById('posts-container');
        posts.forEach(post => {
          const div = document.createElement('div');
          div.classList.add('post');
          div.innerHTML = `<p>${post.content}</p><img src="${post.image ? '/uploads/' + post.image : ''}" width="200"/>`;
          container.appendChild(div);
        });
      });
  </script>
</body>
</html>
